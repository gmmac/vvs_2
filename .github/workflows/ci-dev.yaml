name: CI - Development Branch

on:
  push:
    branches:
      - dev

jobs:
  unit-tests:
    name: Run unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 21
          cache: maven

      - name: Run unit tests
        run: |
          mvn -Dtest=MeetingServiceTest,AppUserDetailsServiceTest,ICalServiceTest,UserServiceTest test
