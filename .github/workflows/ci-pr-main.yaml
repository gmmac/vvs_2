name: CI - Pull Request to Main

on:
  pull_request:
    branches:
      - main

jobs:
  integration-and-e2e-tests:
    name: Run integration and end-to-end tests
    runs-on: ubuntu-latest

    env:
      TZ: Europe/Lisbon
      CHROME_VERSION: 148
      CHROME_BINARY: ${{ github.workspace }}/chrome-linux64/chrome

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Install Chrome 148
        run: |
          wget https://storage.googleapis.com/chrome-for-testing-public/148.0.7778.178/linux64/chrome-linux64.zip
          unzip chrome-linux64.zip
          chmod +x chrome-linux64/chrome
          ./chrome-linux64/chrome --version

      - name: Debug environment
        run: |
          date
          echo "TZ=$TZ"
          echo "CHROME_VERSION=$CHROME_VERSION"
          echo "CHROME_BINARY=$CHROME_BINARY"
          $CHROME_BINARY --version

      - name: Run integration tests
        run: |
          mvn -Duser.timezone=Europe/Lisbon -Dtest="com.example.meetings.integrationTests.db.*Test,com.example.meetings.integrationTests.restApi.*Test,com.example.meetings.integrationTests.thirdParties.*Test" test

      - name: Run end-to-end tests
        run: |
          mvn -Duser.timezone=Europe/Lisbon -Dtest=MeetingEndToEndTest test
