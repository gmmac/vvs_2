spring.datasource.url=jdbc:h2:mem:meetings_test_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Recreate schema for each test context
spring.jpa.hibernate.ddl-auto=create-drop

# H2 dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Avoid using application database
spring.sql.init.mode=never

spring.jpa.show-sql=false

# Required application properties used by controllers/services
app.base-url=http://localhost